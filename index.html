<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
padding:20px;
color:white;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1,h2{
text-align:center;
margin-bottom:15px;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

.hidden{
display:none;
}

img.profile{
width:60px;
height:60px;
object-fit:cover;
border-radius:50%;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h1>Student Registration</h1>

<form id="studentForm">

<label>Full Name</label>
<input type="text" id="fullname" required>

<label>Gender</label>
<select id="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Class</label>
<select id="class" required>
<option value="">Select</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<label>Section</label>
<select id="section" required>
<option value="">Select</option>
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
</select>

<label>Average Result</label>
<input type="number" id="average" required>

<label>Profile Photo</label>
<input type="file" id="photo" accept="image/*" required>

<label>Phone Number (+251)</label>
<input type="text" id="phone" placeholder="9XXXXXXXX" required>

<label>School</label>
<select id="school" required>
<option value="">Select School</option>
<option>Chercher Secondary School</option>
<option>Ifa Islama Secondary School</option>
<option>Tawbaa Secondary School</option>
<option>Future Star School</option>
</select>

<button type="submit">Submit Registration</button>

</form>
</div>

<div class="card">

<h2>Developer Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard" class="card hidden">

<h2>Registered Students</h2>

<table>
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Gender</th>
<th>Class</th>
<th>Section</th>
<th>Average</th>
<th>Phone</th>
<th>School</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

</div>

<script>

const form=document.getElementById("studentForm");

form.addEventListener("submit",function(e){

e.preventDefault();

const file=document.getElementById("photo").files[0];

const reader=new FileReader();

reader.onload=function(){

let students=
JSON.parse(localStorage.getItem("students"))||[];

students.push({

name:document.getElementById("fullname").value,

gender:document.getElementById("gender").value,

classs:document.getElementById("class").value,

section:document.getElementById("section").value,

average:document.getElementById("average").value,

phone:"+251"+document.getElementById("phone").value,

school:document.getElementById("school").value,

photo:reader.result

});

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert("Registration Successful");

form.reset();

};

reader.readAsDataURL(file);

});

function login(){

const username=
document.getElementById("username").value;

const password=
document.getElementById("password").value;

if(
username==="sultan-mehmet"
&&
password==="100%&100$"
){

document.getElementById("dashboard")
.classList.remove("hidden");

loadStudents();

}else{

alert("Invalid Username or Password");

}

}

function loadStudents(){

const students=
JSON.parse(localStorage.getItem("students"))||[];

const table=
document.getElementById("studentTable");

table.innerHTML="";

students.forEach(student=>{

table.innerHTML+=`

<tr>

<td>
<img src="${student.photo}" class="profile">
</td>

<td>${student.name}</td>

<td>${student.gender}</td>

<td>${student.classs}</td>

<td>${student.section}</td>

<td>${student.average}</td>

<td>${student.phone}</td>

<td>${student.school}</td>

</tr>

`;

});

}

</script>

</body>
</html>
